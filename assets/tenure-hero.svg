<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="200" x2="600" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#3f3f46" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade-l" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#3f3f46" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Center glow -->
  <ellipse cx="600" cy="315" rx="300" ry="200" fill="url(#glow)"/>

  <!-- Top decorative line -->
  <line x1="100" y1="80" x2="1100" y2="80" stroke="#1a1a1f" stroke-width="1"/>

  <!-- TENURE wordmark -->
  <text x="600" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#fafafa" letter-spacing="-2">tenure</text>

  <!-- Tagline -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#52525b" letter-spacing="4" font-weight="500">SEMANTIC EXECUTION ROUTER</text>

  <!-- Decorative line under tagline -->
  <line x1="400" y1="195" x2="800" y2="195" stroke="#1f1f23" stroke-width="1"/>

  <!-- LEFT SIDE: Tool calls coming in -->
  
  <!-- Tool call labels -->
  <rect x="60" y="240" width="160" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="140" y="263" text-anchor="middle" font-family="monospace" font-size="13" fill="#3b82f6">web_search</text>
  
  <rect x="60" y="290" width="160" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="140" y="313" text-anchor="middle" font-family="monospace" font-size="13" fill="#f59e0b">file_write</text>
  
  <rect x="60" y="340" width="160" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="140" y="363" text-anchor="middle" font-family="monospace" font-size="13" fill="#ef4444">stripe_charge</text>
  
  <rect x="60" y="390" width="160" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="140" y="413" text-anchor="middle" font-family="monospace" font-size="13" fill="#8b5cf6">browser_crawl</text>

  <rect x="60" y="440" width="160" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#ec4899" stroke-opacity="0.3" stroke-width="1"/>
  <text x="140" y="463" text-anchor="middle" font-family="monospace" font-size="13" fill="#ec4899">ask_human</text>

  <!-- "Agent Tools" label -->
  <text x="140" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3f3f46" letter-spacing="2" font-weight="500">AGENT TOOLS</text>

  <!-- CENTER: The Router -->

  <!-- Connection lines left -->
  <line x1="220" y1="258" x2="440" y2="315" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="220" y1="308" x2="440" y2="325" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="220" y1="358" x2="440" y2="340" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="220" y1="408" x2="440" y2="355" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="220" y1="458" x2="440" y2="370" stroke="#ec4899" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Router box -->
  <rect x="440" y="260" width="320" height="140" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1.5"/>
  
  <!-- Router inner glow -->
  <rect x="442" y="262" width="316" height="136" rx="11" fill="#22c55e" fill-opacity="0.02"/>

  <!-- Router label -->
  <text x="600" y="295" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e" letter-spacing="2">SER</text>
  <text x="600" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#fafafa" font-weight="600" letter-spacing="-0.5">Classify → Route → Meter</text>

  <!-- Router description lines -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#52525b">execution type · temporal primitive · retry policy</text>
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#52525b">thinking time · budget check · OTEL span</text>

  <!-- Connection lines right -->
  <line x1="760" y1="290" x2="940" y2="258" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="760" y1="310" x2="940" y2="308" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="760" y1="330" x2="940" y2="358" stroke="#ef4444" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="760" y1="350" x2="940" y2="408" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="760" y1="370" x2="940" y2="458" stroke="#ec4899" stroke-opacity="0.2" stroke-width="1"/>

  <!-- RIGHT SIDE: Temporal primitives -->

  <!-- "Durable Primitives" label -->
  <text x="1060" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#3f3f46" letter-spacing="2" font-weight="500">DURABLE PRIMITIVES</text>

  <rect x="940" y="240" width="180" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1030" y="263" text-anchor="middle" font-family="monospace" font-size="12" fill="#3b82f6">cached · 5x retry</text>

  <rect x="940" y="290" width="180" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1030" y="313" text-anchor="middle" font-family="monospace" font-size="12" fill="#f59e0b">keyed · dedup guard</text>

  <rect x="940" y="340" width="180" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1030" y="363" text-anchor="middle" font-family="monospace" font-size="12" fill="#ef4444">saga · exactly-once</text>

  <rect x="940" y="390" width="180" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1030" y="413" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b5cf6">heartbeat · resume</text>

  <rect x="940" y="440" width="180" height="36" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#ec4899" stroke-opacity="0.3" stroke-width="1"/>
  <text x="1030" y="463" text-anchor="middle" font-family="monospace" font-size="12" fill="#ec4899">signal · zero compute</text>

  <!-- Bottom tagline -->
  <line x1="100" y1="530" x2="1100" y2="530" stroke="#1a1a1f" stroke-width="1"/>
  
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#71717a" font-weight="400" font-style="italic">A web search and a Stripe charge should not have the same retry policy.</text>

  <!-- Bottom URL -->
  <text x="600" y="600" text-anchor="middle" font-family="monospace" font-size="13" fill="#3f3f46">tenur.ing</text>

</svg>
